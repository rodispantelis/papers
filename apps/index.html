<script>
function generate_table() {
	var body = document.getElementsByTagName("body")[0];
	var table = document.createElement("table");
	var d1=mos.length;
	var d2,d3;
	var cnt=0;

	if(screen.width>700){
		d2=3;}
	else if(screen.width>550){
		d2=3;}
	else if(screen.width>450){
		d2=2;}
	else{
		d2=1;}
		
		d3=135;
		body.style.margin=5;
		body.style.padding=5;

	for (var i = 0; cnt < d1; i++) {
		var row = document.createElement("tr");
		for (var j = 0; (j < d2) && (cnt < d1); j++) {
			var cell = document.createElement("td");
			cell.setAttribute("class","cell");
			cell.setAttribute("id", "q"+i);
			cell.style.width=d3;
			cell.style.height=d3;
			cell.style.margin=15;
			cell.style.padding=15;
			var a = document.createElement("a");
			a.setAttribute("href", mos[cnt][0]);
			a.setAttribute("target", "_blank");
			var image = document.createElement("img");
			image.setAttribute("src",mos[cnt][1]);
			image.setAttribute("title",mos[cnt][2]);
			image.setAttribute("width",d3);
			image.setAttribute("height",d3);
			//image.style.borderRadius="6px";
			cell.style.verticalAlign="top";
			image.style.zIndex=-1000;
			var text=document.createTextNode(mos[cnt][2]);
			a.appendChild(image);
			a.appendChild(text);
			cell.appendChild(a);
			row.appendChild(cell);
			cnt++;
		}
    table.appendChild(row);
	}
	body.appendChild(table);
	table.setAttribute("border", "0");
}
document.body.style.background="rgb(51, 51, 51)";
generate_table();
</script>
</HTML>
